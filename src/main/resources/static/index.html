<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentEngage | AI Education Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    meta http-equiv="Expires" content="0">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .loading-spinner { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-btn.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between flex-wrap">
                <div class="flex items-center space-x-3">
                    <div class="w-9 h-9 gradient-bg rounded-lg flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800">Student<span class="text-indigo-600">Engage</span></span>
                    <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">AI-Powered</span>
                </div>
                <div class="flex space-x-4 mt-2 md:mt-0">
                    <button onclick="showTab('career')" class="tab-btn px-3 py-1 rounded-lg text-gray-600 hover:text-indigo-600 transition" data-tab="career">Career</button>
                    <button onclick="showTab('loan')" class="tab-btn px-3 py-1 rounded-lg text-gray-600 hover:text-indigo-600 transition" data-tab="loan">Loan</button>
                    <button onclick="showTab('universities')" class="tab-btn px-3 py-1 rounded-lg text-gray-600 hover:text-indigo-600 transition" data-tab="universities">Universities</button>
                    <button onclick="window.location.href='/tracker.html'" class="px-3 py-1 rounded-lg text-gray-600 hover:text-indigo-600 transition">Documents</button>
                    <button onclick="showTab('dashboard')" class="tab-btn px-3 py-1 rounded-lg text-gray-600 hover:text-indigo-600 transition" data-tab="dashboard">Dashboard</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-6 py-8">
        <!-- Career Tab -->
        <div id="careerTab" class="tab-content">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">AI Career Advisor</h2>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div><label class="block text-gray-700 font-medium mb-1">Full Name</label><input type="text" id="name" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="Enter your name"></div>
                            <div><label class="block text-gray-700 font-medium mb-1">CGPA / Percentage</label><input type="number" id="cgpa" step="0.1" class="w-full px-4 py-2 border rounded-lg" placeholder="Enter CGPA"></div>
                            <div><label class="block text-gray-700 font-medium mb-1">Field of Interest</label><select id="field" class="w-full px-4 py-2 border rounded-lg"><option value="">Select field</option><option value="AI/ML">🤖 Artificial Intelligence / Machine Learning</option><option value="Data Science">📊 Data Science & Analytics</option><option value="Computer Science">💻 Computer Science</option><option value="Business Analytics">📈 Business Analytics</option><option value="Cybersecurity">🔒 Cybersecurity</option></select></div>
                            <div><label class="block text-gray-700 font-medium mb-1">Budget (₹ Lakhs)</label><input type="number" id="budget" class="w-full px-4 py-2 border rounded-lg" placeholder="Enter budget"></div>
                            <button onclick="getCareerAdvice()" class="w-full gradient-bg text-white font-semibold py-2 rounded-lg hover:opacity-90 transition">Get AI Advice</button>
                        </div>
                        <div class="bg-indigo-50 rounded-xl p-4">
                            <h3 class="font-semibold text-gray-800 mb-3">Quick Stats</h3>
                            <div class="grid grid-cols-2 gap-3"><div class="text-center p-2 bg-white rounded-lg"><div class="text-2xl font-bold text-indigo-600">16+</div><div class="text-sm">Universities</div></div><div class="text-center p-2 bg-white rounded-lg"><div class="text-2xl font-bold text-indigo-600">6+</div><div class="text-sm">Countries</div></div><div class="text-center p-2 bg-white rounded-lg"><div class="text-2xl font-bold text-indigo-600">95%</div><div class="text-sm">Match Accuracy</div></div><div class="text-center p-2 bg-white rounded-lg"><div class="text-2xl font-bold text-indigo-600">₹8L-60L</div><div class="text-sm">Cost Range</div></div></div>
                        </div>
                    </div>
                    <div id="careerResult" class="mt-6 hidden"><div id="aiAdvice" class="bg-gray-50 p-4 rounded-lg whitespace-pre-wrap"></div><div id="universitiesList" class="grid md:grid-cols-2 gap-4 mt-4"></div></div>
                </div>
            </div>
        </div>

        <!-- Loan Tab -->
        <div id="loanTab" class="tab-content hidden">
            <div class="max-w-4xl mx-auto"><div class="bg-white rounded-2xl shadow-lg p-6"><h2 class="text-2xl font-bold mb-6">Education Loan Analyzer</h2><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-medium mb-1">Loan Amount (₹)</label><input type="number" id="loanAmount" class="w-full px-4 py-2 border rounded-lg" placeholder="Enter loan amount"></div><div><label class="block text-gray-700 font-medium mb-1">Tenure (Years)</label><input type="number" id="tenure" class="w-full px-4 py-2 border rounded-lg" placeholder="Enter tenure"></div><div><label class="block text-gray-700 font-medium mb-1">Expected Salary (₹/year)</label><input type="number" id="expectedSalary" class="w-full px-4 py-2 border rounded-lg" placeholder="Enter expected salary"></div></div><button onclick="checkLoanEligibility()" class="mt-4 w-full gradient-bg text-white font-semibold py-2 rounded-lg hover:opacity-90 transition">Analyze Loan</button><div id="loanResult" class="mt-6 hidden"></div></div></div>
        </div>

        <!-- Universities Tab -->
        <div id="universitiesTab" class="tab-content hidden">
            <div class="max-w-7xl mx-auto"><div class="bg-white rounded-2xl shadow-lg p-6"><div class="flex gap-4 mb-6"><input type="text" id="searchQuery" placeholder="Search universities..." class="flex-1 px-4 py-2 border rounded-lg"><button onclick="searchUniversities()" class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90 transition">Search</button></div><div id="universitiesResult" class="grid md:grid-cols-3 gap-4"></div></div></div>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab-content hidden">
            <div class="max-w-6xl mx-auto"><div class="bg-white rounded-2xl shadow-lg p-6"><div class="grid md:grid-cols-3 gap-4 mb-6"><div class="text-center p-4 bg-indigo-50 rounded-xl"><div class="text-3xl font-bold text-indigo-600" id="totalCountries">0</div><div>Countries</div></div><div class="text-center p-4 bg-indigo-50 rounded-xl"><div class="text-3xl font-bold text-indigo-600" id="totalUniversities">0</div><div>Universities</div></div><div class="text-center p-4 bg-indigo-50 rounded-xl"><div class="text-3xl font-bold text-indigo-600" id="avgSalary">$0</div><div>Avg Salary</div></div></div></div></div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let allUniversities = [];
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabName + 'Tab').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(tabName === 'dashboard') loadDashboard();
            if(tabName === 'universities') loadAllUniversities();
        }
        
        async function getCareerAdvice() {
            const name = document.getElementById('name').value || 'Student';
            const cgpa = document.getElementById('cgpa').value;
            const field = document.getElementById('field').value;
            const budget = document.getElementById('budget').value;
            
            if(!cgpa || !field || !budget) {
                alert('Please fill all fields: CGPA, Field of Interest, and Budget');
                return;
            }
            
            document.getElementById('careerResult').classList.remove('hidden');
            document.getElementById('aiAdvice').innerHTML = '<div class="text-center"><div class="loading-spinner"></div><p class="mt-2">AI analyzing your profile...</p></div>';
            document.getElementById('universitiesList').innerHTML = '<div class="text-center">Loading recommendations...</div>';
            
            try {
                const response = await fetch('/api/career/advice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, cgpa, field, budget })
                });
                const data = await response.json();
                document.getElementById('aiAdvice').innerHTML = (data.ai_powered_advice || 'No advice received').replace(/\n/g, '<br>');
                const universities = data.rag_retrieved_universities || [];
                if(universities.length > 0) {
                    document.getElementById('universitiesList').innerHTML = universities.map(uni => `
                        <div class="bg-white border rounded-lg p-4 shadow hover:shadow-md transition">
                            <h4 class="font-bold text-lg text-indigo-600">${uni.name}</h4>
                            <p class="text-gray-600">📍 ${uni.country} | Rank #${uni.ranking}</p>
                            <p class="text-sm mt-2">💰 Cost: $${uni.cost}/year</p>
                            <p class="text-sm">💵 Expected Salary: $${uni.avgSalary}/year</p>
                            <span class="inline-block mt-2 text-xs font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">Match: ${Math.round(uni.relevanceScore || 85)}%</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('universitiesList').innerHTML = '<p class="text-gray-500 text-center">No universities found. Try different criteria.</p>';
                }
            } catch(error) {
                console.error('Error:', error);
                document.getElementById('aiAdvice').innerHTML = '<div class="text-red-500 text-center">Error connecting to server. Please make sure the backend is running.</div>';
                document.getElementById('universitiesList').innerHTML = '';
            }
        }
        
        async function checkLoanEligibility() {
            const loanAmount = document.getElementById('loanAmount').value;
            const tenure = document.getElementById('tenure').value;
            const expectedSalary = document.getElementById('expectedSalary').value;
            
            if(!loanAmount || !tenure || !expectedSalary) {
                alert('Please fill all loan fields');
                return;
            }
            
            document.getElementById('loanResult').classList.remove('hidden');
            document.getElementById('loanAnalysis').innerHTML = '<div class="text-center"><div class="loading-spinner"></div><p class="mt-2">Analyzing your loan...</p></div>';
            
            try {
                const response = await fetch('/api/loan/eligibility', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        loanAmount: parseInt(loanAmount), 
                        tenure: parseInt(tenure), 
                        expectedSalary: parseInt(expectedSalary) 
                    })
                });
                const data = await response.json();
                const statusClass = data.status === 'ELIGIBLE' ? 'bg-green-100 border-green-500' : 
                                   (data.status === 'PARTIALLY_ELIGIBLE' ? 'bg-yellow-100 border-yellow-500' : 'bg-red-100 border-red-500');
                
                let html = `<div class="${statusClass} border-l-4 p-4 rounded-lg">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div><strong>Status:</strong> <span class="font-bold">${data.status}</span></div>
                        <div><strong>Monthly EMI:</strong> ${data.monthly_emi || 'N/A'}</div>
                        <div><strong>EMI/Income Ratio:</strong> ${data.emi_to_income_ratio || 'N/A'}</div>
                        <div><strong>Loan Amount:</strong> ₹${data.loan_amount_lakhs || 'N/A'} Lakhs</div>
                    </div>
                </div>`;
                
                if(data.ai_loan_advice) {
                    html += `<div class="bg-gray-50 p-4 rounded-lg mt-4">${data.ai_loan_advice.replace(/\n/g, '<br>')}</div>`;
                }
                document.getElementById('loanAnalysis').innerHTML = html;
            } catch(error) {
                document.getElementById('loanAnalysis').innerHTML = '<div class="text-red-500">Error analyzing loan. Please try again.</div>';
            }
        }
        
        async function searchUniversities() {
            const query = document.getElementById('searchQuery').value;
            try {
                const response = await fetch(`/api/universities?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                allUniversities = data.universities || [];
                displayUniversities(allUniversities);
            } catch(error) {
                document.getElementById('universitiesResult').innerHTML = '<div class="text-red-500 text-center">Error loading universities</div>';
            }
        }
        
        function displayUniversities(universities) {
            if(!universities.length) {
                document.getElementById('universitiesResult').innerHTML = '<p class="text-center text-gray-500">No universities found</p>';
                return;
            }
            document.getElementById('universitiesResult').innerHTML = universities.map(uni => `
                <div class="bg-white border rounded-lg p-4 shadow hover:shadow-md transition">
                    <h4 class="font-bold text-lg text-indigo-600">${uni.name}</h4>
                    <p class="text-gray-600">📍 ${uni.country} | Rank #${uni.ranking}</p>
                    <p class="text-sm mt-2">💰 Cost: $${uni.cost}/year</p>
                    <p class="text-sm">💵 Expected Salary: $${uni.avgSalary}/year</p>
                    <p class="text-xs text-gray-500 mt-2">🎓 ${uni.courses || 'Various programs'}</p>
                </div>
            `).join('');
        }
        
        async function loadAllUniversities() {
            try {
                const response = await fetch('/api/universities');
                const data = await response.json();
                allUniversities = data.universities || [];
                displayUniversities(allUniversities);
            } catch(error) {
                console.error('Error loading universities:', error);
            }
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch('/api/universities');
                const data = await response.json();
                const universities = data.universities || [];
                const countries = [...new Set(universities.map(u => u.country))];
                document.getElementById('totalCountries').innerText = countries.length;
                document.getElementById('totalUniversities').innerText = universities.length;
                const avgSalary = universities.reduce((sum, u) => sum + (u.avgSalary || 0), 0) / universities.length;
                document.getElementById('avgSalary').innerText = '$' + Math.round(avgSalary / 1000) + 'k';
            } catch(error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        // Initialize
        loadAllUniversities();
        showTab('career');
    </script>
</body>
</html>
