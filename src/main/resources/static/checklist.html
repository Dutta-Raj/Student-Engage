<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentEngage - Document Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .glass-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
        }
        .progress-bar {
            transition: width 0.5s ease;
        }
        .checklist-item {
            transition: all 0.3s ease;
        }
        .checklist-item:hover {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-indigo-600">📋 Document Checklist</h1>
                <p class="text-gray-500 mt-1">Track your application documents</p>
            </div>
            <a href="/" class="text-indigo-600 hover:text-indigo-800">← Back to Dashboard</a>
        </div>

        <!-- Progress -->
        <div class="mb-6">
            <div class="flex justify-between mb-2">
                <span class="font-semibold">Overall Progress</span>
                <span class="font-bold text-indigo-600" id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4">
                <div id="progressBar" class="bg-indigo-600 h-4 rounded-full progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Checklist Items -->
        <div id="checklistContainer" class="space-y-4 mb-6"></div>

        <!-- Report Preview -->
        <div class="bg-gray-50 rounded-lg p-4 mb-6">
            <h3 class="font-bold mb-2">📄 Report Preview</h3>
            <div id="reportPreview" class="text-xs text-gray-600 font-mono whitespace-pre-wrap bg-white p-3 rounded max-h-48 overflow-auto"></div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 flex-wrap">
            <button id="copyBtn" class="btn-primary text-white px-6 py-2 rounded-lg flex items-center gap-2">
                <i class="fas fa-copy"></i> Copy Report
            </button>
            <button id="saveBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 flex items-center gap-2">
                <i class="fas fa-download"></i> Save as File
            </button>
            <button id="resetBtn" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 flex items-center gap-2">
                <i class="fas fa-redo"></i> Reset All
            </button>
        </div>

        <div class="mt-4 text-sm text-gray-500 bg-yellow-50 p-2 rounded text-center">
            💡 Tip: Click "Copy Report" → Open Notepad → Paste (Ctrl+V) → Save as .txt file
        </div>
    </div>

    <script>
        const checklistData = [
            { id: "passport", name: "Valid Passport", category: "Personal" },
            { id: "photo", name: "Passport Size Photographs", category: "Personal" },
            { id: "transcripts", name: "Academic Transcripts", category: "Academic" },
            { id: "degree", name: "Degree Certificate", category: "Academic" },
            { id: "ielts", name: "IELTS/TOEFL Score", category: "Tests" },
            { id: "gre", name: "GRE/GMAT Score", category: "Tests" },
            { id: "bank", name: "Bank Statements", category: "Financial" },
            { id: "loan", name: "Loan Sanction Letter", category: "Financial" },
            { id: "offer", name: "University Offer Letter", category: "Visa" },
            { id: "i20", name: "I-20 / CAS Letter", category: "Visa" },
            { id: "visaFee", name: "Visa Fee Receipt", category: "Visa" }
        ];

        let checklistStatus = {};

        function loadChecklist() {
            const saved = localStorage.getItem('studentEngage_checklist_final');
            if (saved) {
                checklistStatus = JSON.parse(saved);
            } else {
                checklistData.forEach(item => { checklistStatus[item.id] = false; });
            }
            renderChecklist();
            updateProgress();
            updateReport();
        }

        function renderChecklist() {
            const categories = [...new Set(checklistData.map(i => i.category))];
            const html = categories.map(cat => `
                <div>
                    <h3 class="font-bold text-gray-700 mb-2">${cat}</h3>
                    <div class="space-y-2">
                        ${checklistData.filter(i => i.category === cat).map(item => `
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <div class="flex items-center">
                                    <i class="${checklistStatus[item.id] ? 'fas fa-check-circle text-green-500' : 'far fa-circle text-gray-400'} mr-3"></i>
                                    <span class="${checklistStatus[item.id] ? 'line-through text-gray-500' : ''}">${item.name}</span>
                                </div>
                                <button onclick="toggleItem('${item.id}')" class="px-3 py-1 rounded text-sm ${checklistStatus[item.id] ? 'bg-green-100 text-green-600' : 'bg-indigo-100 text-indigo-600'}">
                                    ${checklistStatus[item.id] ? 'Completed' : 'Mark Complete'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('checklistContainer').innerHTML = html;
        }

        function toggleItem(id) {
            checklistStatus[id] = !checklistStatus[id];
            localStorage.setItem('studentEngage_checklist_final', JSON.stringify(checklistStatus));
            renderChecklist();
            updateProgress();
            updateReport();
        }

        function updateProgress() {
            const total = checklistData.length;
            const completed = Object.values(checklistStatus).filter(v => v === true).length;
            const percent = Math.round((completed / total) * 100);
            document.getElementById('progressPercent').innerText = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        function generateReport() {
            const total = checklistData.length;
            const completed = Object.values(checklistStatus).filter(v => v === true).length;
            const percent = Math.round((completed / total) * 100);
            const date = new Date().toLocaleString();
            const completedItems = checklistData.filter(item => checklistStatus[item.id]);
            const pendingItems = checklistData.filter(item => !checklistStatus[item.id]);

            let report = '';
            report += '='.repeat(60) + '\n';
            report += 'STUDENTENGAGE - CHECKLIST REPORT\n';
            report += '='.repeat(60) + '\n\n';
            report += `Date: ${date}\n`;
            report += `Progress: ${completed}/${total} (${percent}%)\n\n`;
            report += `COMPLETED ITEMS (${completedItems.length}):\n`;
            completedItems.forEach((item, i) => { report += `  ${i+1}. ${item.name}\n`; });
            report += `\nPENDING ITEMS (${pendingItems.length}):\n`;
            pendingItems.forEach((item, i) => { report += `  ${i+1}. ${item.name}\n`; });
            report += '\n' + '='.repeat(60) + '\n';
            return report;
        }

        function updateReport() {
            document.getElementById('reportPreview').innerText = generateReport();
        }

        function copyReport() {
            navigator.clipboard.writeText(generateReport());
            alert('✅ Report copied! Open Notepad and paste (Ctrl+V)');
        }

        function saveFile() {
            const blob = new Blob([generateReport()], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `checklist_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
            alert('✅ File downloaded!');
        }

        function resetAll() {
            if (confirm('Reset all items?')) {
                checklistData.forEach(item => { checklistStatus[item.id] = false; });
                localStorage.setItem('studentEngage_checklist_final', JSON.stringify(checklistStatus));
                renderChecklist();
                updateProgress();
                updateReport();
                alert('✅ Reset complete!');
            }
        }

        document.getElementById('copyBtn').onclick = copyReport;
        document.getElementById('saveBtn').onclick = saveFile;
        document.getElementById('resetBtn').onclick = resetAll;
        loadChecklist();
    </script>
</body>
</html>
